apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mechanical-completion-frontend-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mechanical-completion-frontend
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 100 # Auto-scale jika CPU usage >50%
